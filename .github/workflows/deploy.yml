name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set deployment path
        id: vars
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "target=/" >> $GITHUB_OUTPUT
          else
            echo "target=/dev/" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ steps.vars.outputs.target }}
          local-dir: ./
          timeout: 60000
          log-level: minimal
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.private/**
            **/node_modules/**
            **/wp-admin/**
            **/wp-includes/**
            **/wp-content/uploads/**
            **/wp-content/cache/**
            **/wp-content/upgrade/**
            **/wp-content/backup-db/**
            **/wp-content/backups/**
            **/backup/**
            **/wp-config.php
            **/wp-config-sample.php
            **/.env
            **/.DS_Store
            **/.htaccess
            **/.htaccess.bk
            **/.htaccess.old-*
            **/*.sql
            **/*.zip
            **/readme.html
            **/license.txt
